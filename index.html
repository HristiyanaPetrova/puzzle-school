<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEM Center Opening - Interactive Puzzle</title>
    <style>
        :root {
            --stem-red: #ff4d4d;
            --stem-green: #2ecc71;
            --stem-blue: #3498db;
            --stem-yellow: #f1c40f;
            --bg-dark: #0a0e14;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            transition: background-color 0.4s ease;
        }

        /* Светкавица при успех */
        .success-flash {
            animation: flash 0.8s ease-out;
        }

        @keyframes flash {
            0% { background-color: var(--bg-dark); }
            50% { background-color: #2ecc71; }
            100% { background-color: var(--bg-dark); }
        }

        h1 {
            font-size: 3rem;
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: white;
            text-shadow: 0 0 20px var(--stem-blue);
        }

        #status-bar {
            font-size: 1.5rem;
            color: var(--stem-yellow);
            margin-bottom: 20px;
            font-weight: bold;
        }

        #canvas-wrapper {
            position: relative;
            width: 900px;
            height: 500px;
            border: 6px solid #2c3e50;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            background-image: url('school_building.jpg');
            background-size: cover;
            background-position: center;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 100%;
            height: 100%;
        }

        .tile {
            background-image: url('stem_logo.jpg');
            background-size: 900px 500px;
            border: 1px solid rgba(255,255,255,0.15);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 900;
            color: white;
            text-shadow: 3px 3px 6px rgba(0,0,0,1);
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s;
        }

        .tile:hover {
            filter: brightness(1.3);
            box-shadow: inset 0 0 15px white;
            transform: scale(0.97);
        }

        .tile.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.1);
        }

        /* Modal */
        #overlay {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            z-index: 99;
        }

        #question-box {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #151921;
            padding: 40px;
            border-radius: 25px;
            border: 3px solid var(--stem-blue);
            width: 650px;
            z-index: 100;
            text-align: center;
            box-shadow: 0 0 60px var(--stem-blue);
        }

        .question-text {
            font-size: 2rem;
            margin-bottom: 30px;
            line-height: 1.3;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .opt-btn {
            padding: 18px;
            font-size: 1.4rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: 0.2s;
        }

        .btn-0 { background: var(--stem-red); }
        .btn-1 { background: var(--stem-green); }
        .btn-2 { background: var(--stem-yellow); color: black; }

        .opt-btn:hover {
            transform: translateY(-5px);
            filter: brightness(1.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <h1>STEM ЦЕНТЪР: ОТКРИВАНЕ</h1>
    <div id="status-bar">ПРОГРЕС: 0 / 15</div>

    <div id="canvas-wrapper">
        <div id="grid"></div>
    </div>

    <div id="overlay"></div>
    <div id="question-box">
        <div class="question-text" id="q-text">Въпрос?</div>
        <div class="options-list" id="opt-list"></div>
    </div>

<script>
    const questions = [
        { q: "Кой елемент е най-разпространен във Вселената?", o: ["Кислород", "Водород", "Желязо"], a: 1 },
        { q: "Какъв е обемът на човешкото тяло, съставен от вода?", o: ["20%", "60%", "95%"], a: 1 },
        { q: "Какво означава съкращението AI?", o: ["Алгоритмична информация", "Изкуствен интелект", "Автоматичен интерфейс"], a: 1 },
        { q: "Какво прави един 3D принтер?", o: ["Принтира снимки", "Създава обекти слой по слой", "Сканира документи"], a: 1 },
        { q: "Коя е най-здравата геометрична форма за мостове?", o: ["Квадрат", "Триъгълник", "Кръг"], a: 1 },
        { q: "Кой е първият изкуствен спътник на Земята?", o: ["Аполо-11", "Спутник-1", "Хъбъл"], a: 1 },
        { q: "Какво е прототип?", o: ["Крайният продукт", "Първият тестов модел", "Ръководство"], a: 1 },
        { q: "Какво е ДНК?", o: ["Генетична информация", "Вид микроскоп", "Вид пластмаса"], a: 0 },
        { q: "Какво означава съкращението IoT?", o: ["Интернет на нещата", "Онлайн транспорт", "Игри за таблет"], a: 0 },
        { q: "Коя е най-малката единица компютърни данни?", o: ["Байт", "Бит", "Килобайт"], a: 1 },
        { q: "Какво е числото Пи (π)?", o: ["Рационално 3,14", "Целочислена константа", "Отношение обиколка към диаметър"], a: 2 },
        { q: "Първото по приоритет математическо действие е...?", o: ["Умножение", "Събиране", "Степенуване и скоби"], a: 2 },
        { q: "Какъв е сборът от ъглите в триъгълник?", o: ["90°", "180°", "360°"], a: 1 },
        { q: "Основната съставка на пясъка и стъклото е...?", o: ["Натриев хлорид", "Силициев диоксид", "Калциев карбонат"], a: 1 },
        { q: "Колко време пътува светлината от Слънцето до Земята?", o: ["8 секунди", "8 минути", "8 часа"], a: 1 }
    ];

    let solved = 0;
    let activeTile = null;

    function createGrid() {
        const gridElement = document.getElementById('grid');
        for (let i = 0; i < 15; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.innerText = i + 1;
            
            // Настройка на маската
            const x = (i % 5) * 180;
            const y = Math.floor(i / 5) * 166.6;
            tile.style.backgroundPosition = `-${x}px -${y}px`;
            
            tile.onclick = () => openModal(i, tile);
            gridElement.appendChild(tile);
        }
    }

    function openModal(idx, tile) {
        activeTile = tile;
        const qData = questions[idx];
        document.getElementById('q-text').innerText = qData.q;
        const list = document.getElementById('opt-list');
        list.innerHTML = '';

        qData.o.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = `opt-btn btn-${i}`;
            b.innerText = opt;
            b.onclick = () => verify(i, qData.a);
            list.appendChild(b);
        });

        document.getElementById('overlay').style.display = 'block';
        document.getElementById('question-box').style.display = 'block';
    }

    function verify(choice, correct) {
        if (choice === correct) {
            document.body.classList.add('success-flash');
            setTimeout(() => document.body.classList.remove('success-flash'), 800);
            
            activeTile.classList.add('hidden');
            solved++;
            document.getElementById('status-bar').innerText = `ПРОГРЕС: ${solved} / 15`;
            
            if (solved === 15) {
                document.getElementById('status-bar').innerText = "STEM ЦЕНТЪРЪТ Е ОТКЛЮЧЕН!";
                document.getElementById('status-bar').style.color = "#2ecc71";
            }
        } else {
            alert("Грешен отговор! Опитайте отново.");
        }
        closeModal();
    }

    function closeModal() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('question-box').style.display = 'none';
    }

    createGrid();
</script>

</body>
</html>
