<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEM Център - Пъзел</title>
    <style>
        body {
            background-color: #f0f2f5;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .header-container { text-align: center; margin-bottom: 20px; }
        .school-name { font-size: 1.8rem; margin: 0; color: #333; }
        .stem-title { font-size: 3rem; margin: 0; color: #2ecc71; text-transform: uppercase; }

        #canvas-wrapper {
            width: 1000px; /* Фиксирана ширина */
            height: 600px; /* Фиксирана височина */
            position: relative;
            background: white;
            border: 10px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            /* Фонът под пъзела - Снимка 2 */
            background-image: url('school_building.jpg');
            background-size: 1000px 600px;
            background-repeat: no-repeat;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(5, 200px); /* 5 колони по точно 200px */
            grid-template-rows: repeat(3, 200px);    /* 3 реда по точно 200px */
            width: 1000px;
            height: 600px;
            gap: 0; /* Важно: никакви разстояния между плочките */
        }

        .tile {
            width: 200px;
            height: 200px;
            background-image: url('stem_logo.jpg');
            background-size: 1000px 600px; /* Снимката винаги е 1000х600 вътре в плочката */
            background-repeat: no-repeat;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            font-weight: bold;
            -webkit-text-stroke: 1px black;
            box-sizing: border-box;
            border: 0.1px solid rgba(255,255,255,0.05); /* Едва забележима линия за ориентация */
        }

        .tile.hidden { opacity: 0; pointer-events: none; transition: opacity 0.4s; }

        #status-bar { font-size: 1.5rem; margin-bottom: 10px; font-weight: bold; color: #3498db; }
        
        /* Modal Styles */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10; }
        #question-box { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 15px; z-index: 11; width: 500px; text-align: center; }
        .opt-btn { display: block; width: 100%; padding: 10px; margin: 10px 0; cursor: pointer; font-size: 1.2rem; border-radius: 8px; border: none; background: #3498db; color: white; }
    </style>
</head>
<body>

    <div class="header-container">
        <p class="school-name">ОУ "Св. Патриарх Евтимий"</p>
        <h1 class="stem-title">STEM център</h1>
    </div>

    <div id="status-bar">ОТКЛЮЧЕНИ МОДУЛИ: 0 / 15</div>

    <div id="canvas-wrapper">
        <div id="grid"></div>
    </div>

    <div id="overlay"></div>
    <div id="question-box">
        <h2 id="q-text">Въпрос</h2>
        <div id="opt-list"></div>
    </div>

    <script>
        const questions = [
            { q: "Въпрос 1", o: ["Отговор А", "Отговор Б", "Отговор В"], a: 1 },
            { q: "Въпрос 2", o: ["Отговор А", "Отговор Б", "Отговор В"], a: 0 },
            // ... добавете останалите въпроси тук ...
        ];

        let solved = 0;
        let activeTile = null;

        function init() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            for (let i = 0; i < 15; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.innerText = i + 1;

                // Точно изчисляване на позицията на фона в пиксели
                const col = i % 5;
                const row = Math.floor(i / 5);
                const posX = col * 200;
                const posY = row * 200;

                tile.style.backgroundPosition = `-${posX}px -${posY}px`;
                
                tile.onclick = () => {
                    activeTile = tile;
                    showQuestion(i % questions.length);
                };
                grid.appendChild(tile);
            }
        }

        function showQuestion(idx) {
            const q = questions[idx];
            document.getElementById('q-text').innerText = q.q;
            const list = document.getElementById('opt-list');
            list.innerHTML = '';
            q.o.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    if (i === q.a) {
                        activeTile.classList.add('hidden');
                        solved++;
                        document.getElementById('status-bar').innerText = `ОТКЛЮЧЕНИ МОДУЛИ: ${solved} / 15`;
                        hideModal();
                    } else {
                        alert("Помисли, не бързай!");
                    }
                };
                list.appendChild(btn);
            });
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('question-box').style.display = 'block';
        }

        function hideModal() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('question-box').style.display = 'none';
        }

        window.onload = init;
    </script>
</body>
</html>
