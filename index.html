<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вертикала на познанието - STEM</title>
    <style>
        :root {
            --bright-red: #ff0033;
            --bright-green: #00ff66;
            --bright-blue: #00ccff;
            --bright-yellow: #ffcc00;
            --bg-dark: #05070a;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Segoe UI', Impact, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .main-title {
            font-size: 4rem;
            margin: 10px 0;
            text-transform: uppercase;
            font-weight: 900;
            background: linear-gradient(to right, var(--bright-red), var(--bright-yellow), var(--bright-green), var(--bright-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
            letter-spacing: 5px;
        }

        #status-bar {
            font-size: 1.8rem;
            color: var(--bright-blue);
            margin-bottom: 15px;
            text-shadow: 0 0 10px var(--bright-blue);
        }

        #canvas-wrapper {
            position: relative;
            width: 1000px; /* Малко по-голям за по-добра видимост */
            height: 560px;
            border: 5px solid #ffffff;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0, 204, 255, 0.5);
            background-image: url('school_building.jpg');
            background-size: 100% 100%;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 100%;
            height: 100%;
        }

        .tile {
            background-image: url('stem_logo.jpg');
            background-size: 1000px 560px; /* Съвпада точно с контейнера */
            border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: 900;
            color: #fff;
            /* Изключително четливи числа */
            -webkit-text-stroke: 3px #000;
            paint-order: stroke fill;
            text-shadow: 4px 4px 0px #000;
            transition: all 0.4s ease;
        }

        .tile:hover {
            transform: scale(0.96);
            filter: brightness(1.4);
            border-color: var(--bright-yellow);
        }

        .tile.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.5) rotate(10deg);
        }

        /* Modal & UI */
        #overlay {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            z-index: 99;
        }

        #question-box {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            padding: 50px;
            border-radius: 30px;
            border: 5px solid var(--bright-yellow);
            width: 750px;
            z-index: 100;
            text-align: center;
            box-shadow: 0 0 80px var(--bright-yellow);
        }

        .question-text {
            font-size: 2.5rem;
            margin-bottom: 40px;
            color: #fff;
        }

        .opt-btn {
            display: block;
            width: 100%;
            padding: 20px;
            margin-bottom: 15px;
            font-size: 1.8rem;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: 0.3s;
        }

        .btn-0 { background: var(--bright-red); }
        .btn-1 { background: var(--bright-green); color: #000; }
        .btn-2 { background: var(--bright-blue); }

        .opt-btn:hover {
            transform: scale(1.03);
            filter: brightness(1.3);
        }

        .success-flash {
            animation: flash 0.5s infinite alternate;
        }

        @keyframes flash {
            from { box-shadow: 0 0 20px var(--bright-green); }
            to { box-shadow: 0 0 60px var(--bright-green); }
        }
    </style>
</head>
<body>

    <div class="main-title">ВЕРТИКАЛА НА ПОЗНАНИЕТО</div>
    <div id="status-bar">ОТКЛЮЧЕНИ МОДУЛИ: 0 / 15</div>

    <div id="canvas-wrapper">
        <div id="grid"></div>
    </div>

    <div id="overlay"></div>
    <div id="question-box">
        <div class="question-text" id="q-text">Въпрос?</div>
        <div id="opt-list"></div>
    </div>

<script>
    const questions = [
        { q: "Кой елемент е най-разпространен във Вселената?", o: ["Кислород", "Водород", "Желязо"], a: 1 },
        { q: "Какъв е обемът на човешкото тяло, съставен от вода?", o: ["20%", "60%", "95%"], a: 1 },
        { q: "Какво означава съкращението AI?", o: ["Алгоритмична информация", "Изкуствен интелект", "Автоматичен интерфейс"], a: 1 },
        { q: "Какво прави един 3D принтер?", o: ["Принтира снимки", "Създава обекти слой по слой", "Сканира документи"], a: 1 },
        { q: "Коя е най-здравата геометрична форма за мостове?", o: ["Квадрат", "Триъгълник", "Кръг"], a: 1 },
        { q: "Кой е първият изкуствен спътник на Земята?", o: ["Аполо-11", "Спутник-1", "Хъбъл"], a: 1 },
        { q: "Какво е прототип?", o: ["Крайният продукт", "Първият тестов модел", "Ръководство"], a: 1 },
        { q: "Какво е ДНК?", o: ["Генетична информация", "Вид микроскоп", "Вид пластмаса"], a: 0 },
        { q: "Какво означава съкращението IoT?", o: ["Интернет на нещата", "Онлайн транспорт", "Игри за таблет"], a: 0 },
        { q: "Коя е най-малката единица компютърни данни?", o: ["Байт", "Бит", "Килобайт"], a: 1 },
        { q: "Какво е числото Пи (π)?", o: ["Рационално 3,14", "Целочислена константа", "Отношение обиколка към диаметър"], a: 2 },
        { q: "Първото по приоритет математическо действие е...?", o: ["Умножение", "Събиране", "Степенуване и скоби"], a: 2 },
        { q: "Какъв е сборът от ъглите в триъгълник?", o: ["90°", "180°", "360°"], a: 1 },
        { q: "Основната съставка на пясъка и стъклото е...?", o: ["Натриев хлорид", "Силициев диоксид", "Калциев карбонат"], a: 1 },
        { q: "Колко време пътува светлината от Слънцето до Земята?", o: ["8 секунди", "8 минути", "8 часа"], a: 1 }
    ];

    let solved = 0;
    let activeTile = null;

    function init() {
        const grid = document.getElementById('grid');
        for (let i = 0; i < 15; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.innerText = i + 1;
            
            const x = (i % 5) * 200; // 1000px / 5
            const y = Math.floor(i / 5) * 186.6; // 560px / 3
            tile.style.backgroundPosition = `-${x}px -${y}px`;
            
            tile.onclick = () => {
                activeTile = tile;
                showQ(i);
            };
            grid.appendChild(tile);
        }
    }

    function showQ(idx) {
        const q = questions[idx];
        document.getElementById('q-text').innerText = q.q;
        const list = document.getElementById('opt-list');
        list.innerHTML = '';
        q.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = `opt-btn btn-${i}`;
            btn.innerText = opt;
            btn.onclick = () => {
                if (i === q.a) {
                    activeTile.classList.add('hidden');
                    solved++;
                    document.getElementById('status-bar').innerText = `ОТКЛЮЧЕНИ МОДУЛИ: ${solved} / 15`;
                    hideModal();
                    if(solved === 15) document.body.style.background = "#000";
                } else {
                    alert("Помисли, не бързай!");
                }
            };
            list.appendChild(btn);
        });
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('question-box').style.display = 'block';
    }

    function hideModal() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('question-box').style.display = 'none';
    }

    init();
</script>
</body>
</html>
