<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEM Център - ОУ Св. Патриарх Евтимий</title>
    <style>
        :root {
            --bright-red: #ff4d4d;
            --bright-green: #2ecc71;
            --bright-blue: #3498db;
            --bright-yellow: #f1c40f;
            --bg-light: #f0f2f5;
        }

        body {
            background-color: var(--bg-light);
            color: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.5s ease-in;
        }

        .header-container { text-align: center; margin-bottom: 10px; }
        .school-name { font-size: 2.2rem; margin: 0; color: #2c3e50; font-weight: 700; }
        .stem-title { 
            font-size: 3.5rem; margin: 0; text-transform: uppercase; font-weight: 900; 
            background: linear-gradient(to right, var(--bright-blue), var(--bright-green));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        #status-bar { font-size: 1.6rem; color: var(--bright-blue); margin-bottom: 15px; font-weight: bold; }

        #canvas-wrapper {
            position: relative;
            width: 900px; /* 180px * 5 колони */
            height: 600px; /* 200px * 3 реда */
            background-color: white;
            border: 15px solid white;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            background-image: url('school_building.jpg');
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 100%;
            height: 100%;
        }

        .tile {
            background-image: url('stem_logo.jpg');
            background-size: 900px 600px; /* Фиксиран размер за точно рязане */
            background-color: white;
            border: 0.5px solid rgba(255,255,255,0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: 900;
            color: white;
            -webkit-text-stroke: 2px #000;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .tile.hidden { opacity: 0; pointer-events: none; transition: opacity 0.6s; }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 99; }
        #question-box { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 40px; border-radius: 25px; border: 6px solid var(--bright-blue); width: 600px; z-index: 100; text-align: center; }
        .question-text { font-size: 2rem; margin-bottom: 30px; color: #2c3e50; line-height: 1.3; }
        .opt-btn { display: block; width: 100%; padding: 15px; margin-bottom: 12px; font-size: 1.5rem; border: none; border-radius: 12px; cursor: pointer; color: white; font-weight: bold; }
        .btn-0 { background: var(--bright-red); }
        .btn-1 { background: var(--bright-green); }
        .btn-2 { background: var(--bright-blue); }
    </style>
</head>
<body>

    <div class="header-container">
        <p class="school-name">ОУ "Св. Патриарх Евтимий"</p>
        <h1 class="stem-title">STEM център</h1>
    </div>

    <div id="status-bar">ОТКЛЮЧЕНИ МОДУЛИ: 0 / 15</div>

    <div id="canvas-wrapper">
        <div id="grid"></div>
    </div>

    <div id="overlay"></div>
    <div id="question-box">
        <div class="question-text" id="q-text">Въпрос?</div>
        <div id="opt-list"></div>
    </div>

<script>
    const questions = [
        { q: "Кой елемент е най-разпространен във Вселената?", o: ["Кислород", "Водород", "Желязо"], a: 1 },
        { q: "Какъв е обемът на човешкото тяло, съставен от вода?", o: ["20%", "60%", "95%"], a: 1 },
        { q: "Какво означава съкращението AI?", o: ["Алгоритмична информация", "Изкуствен интелект", "Автоматичен интерфейс"], a: 1 },
        { q: "Какво прави един 3D принтер?", o: ["Принтира снимки", "Създава обекти слой по слой", "Сканира документи"], a: 1 },
        { q: "Коя е най-здравата геометрична форма за мостове?", o: ["Квадрат", "Триъгълник", "Кръг"], a: 1 },
        { q: "Кой е първият изкуствен спътник на Земята?", o: ["Аполо-11", "Спутник-1", "Хъбъл"], a: 1 },
        { q: "Какво е прототип?", o: ["Крайният продукт", "Първият тестов модел", "Ръководство"], a: 1 },
        { q: "Какво е ДНК?", o: ["Генетична информация", "Вид микроскоп", "Вид пластмаса"], a: 0 },
        { q: "Какво означава съкращението IoT?", o: ["Интернет на нещата", "Онлайн транспорт", "Игри за таблет"], a: 0 },
        { q: "Коя е най-малката единица компютърни данни?", o: ["Байт", "Бит", "Килобайт"], a: 1 },
        { q: "Какво е числото Пи (π)?", o: ["Рационално 3,14", "Целочислена константа", "Отношение обиколка към диаметър"], a: 2 },
        { q: "Първото по приоритет математическо действие е...?", o: ["Умножение", "Събиране", "Степенуване и скоби"], a: 2 },
        { q: "Какъв е сборът от ъглите в триъгълник?", o: ["90°", "180°", "360°"], a: 1 },
        { q: "Основната съставка на пясъка и стъклото е...?", o: ["Натриев хлорид", "Силициев диоксид", "Калциев карбонат"], a: 1 },
        { q: "Колко време пътува светлината от Слънцето до Земята?", o: ["8 секунди", "8 минути", "8 часа"], a: 1 }
    ];

    let solved = 0;
    let activeTile = null;

    function init() {
        const grid = document.getElementById('grid');
        for (let i = 0; i < 15; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.innerText = i + 1;
            
            // 900 / 5 = 180px широчина; 600 / 3 = 200px височина
            const x = (i % 5) * 180;
            const y = Math.floor(i / 5) * 200;
            tile.style.backgroundPosition = `-${x}px -${y}px`;
            
            tile.onclick = () => { activeTile = tile; showQ(i); };
            grid.appendChild(tile);
        }
        document.body.style.opacity = "1";
    }

    function showQ(idx) {
        const q = questions[idx];
        document.getElementById('q-text').innerText = q.q;
        const list = document.getElementById('opt-list');
        list.innerHTML = '';
        q.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = `opt-btn btn-${i}`;
            btn.innerText = opt;
            btn.onclick = () => {
                if (i === q.a) {
                    activeTile.classList.add('hidden');
                    solved++;
                    document.getElementById('status-bar').innerText = `ОТКЛЮЧЕНИ МОДУЛИ: ${solved} / 15`;
                    if (solved === 15) celebrate();
                    hideModal();
                } else { alert("Помисли, не бързай!"); }
            };
            list.appendChild(btn);
        });
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('question-box').style.display = 'block';
    }

    function hideModal() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('question-box').style.display = 'none';
    }

    function celebrate() {
        const status = document.getElementById('status-bar');
        status.innerText = "✨ Добре дошли! ✨";
        status.style.fontSize = "3.5rem";
        status.style.color = "#2ecc71";
        for (let i = 0; i < 150; i++) { createParticle(); }
    }

    function createParticle() {
        const p = document.createElement('div');
        p.style.position = 'fixed';
        p.style.width = '10px'; p.style.height = '10px';
        p.style.backgroundColor = ['#ff4d4d', '#2ecc71', '#3498db', '#f1c40f'][Math.floor(Math.random()*4)];
        p.style.left = Math.random() * 100 + 'vw'; p.style.top = '-10px';
        p.style.borderRadius = '50%'; p.style.zIndex = '200';
        document.body.appendChild(p);
        p.animate([{ transform: 'translateY(0)', opacity: 1 }, { transform: 'translateY(110vh)', opacity: 0 }], { duration: Math.random() * 3000 + 2000 }).onfinish = () => p.remove();
    }

    window.onload = init;
</script>
</body>
</html>
