<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вертикала на познанието</title>
    <style>
        :root {
            --bright-red: #ff4d4d;
            --bright-green: #2ecc71;
            --bright-blue: #3498db;
            --bright-yellow: #f1c40f;
            --bg-light: #f0f2f5; /* Изсветлен фон */
        }

        body {
            background-color: var(--bg-light);
            color: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.4s ease;
        }

        h1 {
            font-size: 3.5rem;
            margin: 10px 0;
            text-transform: uppercase;
            font-weight: 900;
            color: #2c3e50;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            letter-spacing: 2px;
        }

        #status-bar {
            font-size: 1.8rem;
            color: var(--bright-blue);
            margin-bottom: 20px;
            font-weight: bold;
            transition: all 0.5s;
        }

        #canvas-wrapper {
            position: relative;
            width: 1000px;
            height: 600px;
            background-color: white; /* Цвят на рамката */
            border: 15px solid white; /* Бяла рамка */
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            /* Настройка на снимката отдолу - без разпъване */
            background-image: url('school_building.jpg');
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 100%;
            height: 100%;
        }

        .tile {
            background-image: url('stem_logo.jpg');
            background-size: 1000px 600px;
            border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: 900;
            color: white;
            -webkit-text-stroke: 2px #000;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tile:hover {
            transform: scale(0.97);
            filter: brightness(1.2);
        }

        .tile.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.1);
        }

            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 1
