<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEM Център - ОУ Св. Патриарх Евтимий</title>
    <style>
        :root {
            --bright-red: #ff4d4d;
            --bright-green: #2ecc71;
            --bright-blue: #3498db;
            --bright-yellow: #f1c40f;
            --bg-light: #f0f2f5;
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .header-container { text-align: center; margin-bottom: 10px; }
        .school-name { font-size: 1.8rem; margin: 0; color: #2c3e50; font-weight: 700; }
        .stem-title { 
            font-size: 3rem; margin: 0; text-transform: uppercase; font-weight: 900; 
            background: linear-gradient(to right, var(--bright-blue), var(--bright-green));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        #status-bar { font-size: 1.5rem; color: var(--bright-blue); margin-bottom: 15px; font-weight: bold; }

        #canvas-wrapper {
            position: relative;
            width: 1000px;
            height: 600px;
            background-color: white;
            border: 10px solid white;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            background-image: url('school_building.jpg');
            background-size: 1000px 600px;
            background-repeat: no-repeat;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(5, 200px);
            grid-template-rows: repeat(3, 200px);
            width: 1000px;
            height: 600px;
            gap: 0;
        }

        .tile {
            width: 200px;
            height: 200px;
            background-image: url('stem_logo.jpg');
            background-size: 1000px 600px;
            background-repeat: no-repeat;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 900;
            color: white;
            -webkit-text-stroke: 1.5px #000;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            box-sizing: border-box;
            border: 0.1px solid rgba(255,255,255,0.1);
        }

        .tile.hidden { opacity: 0; pointer-events: none; transition: opacity 0.5s ease-out; }

        /* Модален прозорец за въпроси */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 99; }
        #question-box { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 40px; border-radius: 20px; border: 6px solid var(--bright-blue); width: 550px; z-index: 100; text-align: center; }
        .question-text { font-size: 1.8rem; margin-bottom: 25px; color: #2c3e50; line-height: 1.3; }
        .opt-btn { display: block; width: 100%; padding: 15px; margin-bottom: 12px; font-size: 1.4rem; border: none; border-radius: 10px; cursor: pointer; color: white; font-weight: bold; transition: 0.2s; }
        .btn-0 { background: var(--bright-red); }
        .btn-1 { background: var(--bright-green); }
        .btn-2 { background: var(--bright-blue); }
        .opt-btn:hover { transform: scale(1.02); filter: brightness(1.1); }
    </style>
</head>
<body>

    <div class="header-container">
        <p class="school-name">ОУ "Св. Патриарх Евтимий"</p>
        <h1 class="stem-title">STEM център</h1>
    </div>

    <div id="status-bar">ОТКЛЮЧЕНИ МОДУЛИ: 0 / 15</div>

    <div id="canvas-wrapper">
        <div id="grid"></div>
    </div>

    <div id="overlay"></div>
    <div id="question-box">
        <div class="question-text" id="q-text">Въпрос?</div>
        <div id="opt-list"></div>
    </div>

<script>
    const questions = [
        { q: "Кой елемент е най-разпространен във Вселената?", o: ["Кислород", "Водород", "Желязо"], a: 1 },
        { q: "Какъв е обемът на човешкото тяло, съставен от вода?", o: ["20%", "60%", "95%"], a: 1 },
        { q: "Какво означава съкращението AI?", o: ["Алгоритмична информация", "Изкуствен интелект", "Автоматичен интерфейс"], a: 1 },
        { q: "Какво прави един 3D принтер?", o: ["Принтира снимки", "Създава обекти слой по слой", "Сканира документи"], a: 1 },
        { q: "Коя е най-здравата геометрична форма за мостове?", o: ["Квадрат", "Триъгълник", "Кръг"], a: 1 },
        { q: "Кой е първият изкуствен спътник на Земята?", o: ["Аполо-11", "Спутник-1", "Хъбъл"], a: 1 },
        { q: "Какво е прототип?", o: ["Крайният продукт", "Първият тестов модел", "Ръководство"], a: 1 },
        { q: "Какво е ДНК?", o: ["Генетична информация", "Вид микроскоп", "Вид пластмаса"], a: 0 },
        { q: "Какво означава съкращението IoT?", o: ["Интернет на нещата", "Онлайн транспорт", "Игри за таблет"], a: 0 },
        { q: "Коя е най-малката единица компютърни данни?", o: ["Байт", "Бит", "Килобайт"], a: 1 },
        { q: "Какво е числото Пи (π)?", o: ["Рационално 3,14", "Целочислена константа", "Отношение обиколка към диаметър"], a: 2 },
        { q: "Първото по приоритет математическо действие е...?", o: ["Умножение", "Събиране", "Степенуване и скоби"], a: 2 },
        { q: "Какъв е сборът от ъглите в триъгълник?", o: ["90°", "180°", "360°"], a: 1 },
        { q: "Основната съставка на пясъка и стъклото е...?", o: ["Натриев хлорид", "Силициев диоксид", "Калциев карбонат"], a: 1 },
        { q: "Колко време пътува светлината от Слънцето до Земята?", o: ["8 секунди", "8 минути", "8 часа"], a: 1 }
    ];

    let solved = 0;
    let activeTile = null;

    function init() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for (let i = 0; i < 15; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.innerText = i + 1;
            
            const col = i % 5;
            const row = Math.floor(i / 5);
            const posX = col * 200;
            const posY = row * 200;
