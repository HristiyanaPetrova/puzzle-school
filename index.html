<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вертикала на познанието</title>
    <style>
        :root {
            --bright-red: #ff0033;
            --bright-green: #00ff66;
            --bright-blue: #00ccff;
            --bright-yellow: #ffcc00;
            --bg-dark: #05070a;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Segoe UI', Impact, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.4s ease;
        }

        h1 {
            font-size: 3.5rem;
            margin: 10px 0;
            text-transform: uppercase;
            font-weight: 900;
            background: linear-gradient(to right, var(--bright-red), var(--bright-yellow), var(--bright-green), var(--bright-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        #status-bar {
            font-size: 1.8rem;
            color: var(--bright-yellow);
            margin-bottom: 20px;
            font-weight: bold;
        }

        #canvas-wrapper {
            position: relative;
            width: 1000px;
            height: 560px;
            border: 5px solid #ffffff;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(0, 204, 255, 0.4);
            background-image: url('school_building.jpg');
            background-size: 100% 100%;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 100%;
            height: 100%;
        }

        .tile {
            background-image: url('stem_logo.jpg');
            background-size: 1000px 560px;
            border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: 900;
            color: #fff;
            -webkit-text-stroke: 2px #000;
            paint-order: stroke fill;
            text-shadow: 3px 3px 0px #000;
            transition: all 0.4s ease;
        }

        .tile:hover { transform: scale(0.96); filter: brightness(1.3); }

        .tile.hidden { opacity: 0; pointer-events: none; transform: scale(1.2); }

        #overlay {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 99;
        }

        #question-box {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: #111;
            padding: 40px; border-radius: 30px; border: 4px solid var(--bright-blue);
            width: 700px; z-index: 100; text-align: center;
        }

        .question-text { font-size: 2.2rem; margin-bottom: 30px; color: #fff; }

        .opt-btn {
            display: block; width: 100%; padding: 18px; margin-bottom: 12px;
            font-size: 1.5rem; border: none; border-radius: 15px;
            cursor: pointer; font-weight: bold; color: white;
        }

        .btn-0 { background: var(--bright-red); }
        .btn-1 { background: var(--bright-green); color: #000; }
        .btn-2 { background: var(--bright-blue); }

        @keyframes flash {
            from { background-color: var(--bg-dark); }
            to { background-color: var(--bright-green); }
        }
        .success-flash { animation: flashSuccess 0.8s; }
        @keyframes flashSuccess {
            0%, 100% { background-color: var(--bg-dark); }
            50% { background-color: #2ecc71; }
        }
    </style>
</head>
<body>

    <h1>ВЕРТИКАЛА НА ПОЗНАНИЕТО</h1>
    <div id="status-bar">ОТКЛЮЧЕНИ МОДУЛИ: 0 / 15</div>

    <div id="canvas-wrapper">
        <div id="grid"></div>
    </div>

    <div id="overlay"></div>
    <div id="question-box">
        <div class="question-text" id="q-text">Въпрос?</div>
        <div id="opt-list"></div>
    </div>

<script>
    const questions = [
        { q: "Кой елемент е най-разпространен във Вселената?", o: ["Кислород", "Водород", "Желязо"], a: 1 },
        { q: "Какъв е обемът на човешкото тяло, съставен от вода?", o: ["20%", "60%", "95%"], a: 1 },
        { q: "Какво означава съкращението AI?", o: ["Алгоритмична информация", "Изкуствен интелект", "Автоматичен интерфейс"], a: 1 },
        { q: "Какво прави един 3D принтер?", o: ["Принтира снимки", "Създава обекти слой по слой", "Сканира документи"], a: 1 },
        { q: "Коя е най-здравата геометрична форма за мостове?", o: ["Квадрат", "Триъгълник", "Кръг"], a: 1 },
        { q: "Кой е първият изкуствен спътник на Земята?", o: ["Аполо-11", "Спутник-1", "Хъбъл"], a: 1 },
        { q: "Какво е прототип?", o: ["Крайният продукт", "Първият тестов модел", "Ръководство"], a: 1 },
        { q: "Какво е ДНК?", o: ["Генетична информация", "Вид микроскоп", "Вид пластмаса"], a: 0 },
        { q: "Какво означава съкращението IoT?", o: ["Интернет на нещата", "Онлайн транспорт", "Игри за таблет"], a: 0 },
        { q: "Коя е най-малката единица компютърни данни?", o: ["Байт", "Бит", "Килобайт"], a: 1 },
        { q: "Какво е числото Пи (π)?", o: ["Рационално 3,14", "Целочислена константа", "Отношение обиколка към диаметър"], a: 2 },
        { q: "Първото по приоритет математическо действие е...?", o: ["Умножение", "Събиране", "Степенуване и скоби"], a: 2 },
        { q: "Какъв е сборът от ъглите в триъгълник?", o: ["90°", "180°", "360°"], a: 1 },
        { q: "Основната съставка на пясъка и стъклото е...?", o: ["Натриев хлорид", "Силициев диоксид", "Калциев карбонат"], a: 1 },
        { q: "Колко време пътува светлината от Слънцето до Земята?", o: ["8 секунди", "8 минути", "8 часа"], a: 1 }
    ];

    let solved = 0;
    let activeTile = null;

    function init() {
        const grid = document.getElementById('grid');
        for (let i = 0; i < 15; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.innerText = i + 1;
            const x = (i % 5) * 200;
            const y = Math.floor(i / 5) * 186.6;
            tile.style.backgroundPosition = `-${x}px -${y}px`;
            tile.onclick = () => { activeTile = tile; showQ(i); };
            grid.appendChild(tile);
        }
    }

    function showQ(idx) {
        const q = questions[idx];
        document.getElementById('q-text').innerText = q.q;
        const list = document.getElementById('opt-list');
        list.innerHTML = '';
        q.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = `opt-btn btn-${i}`;
            btn.innerText = opt;
            btn.onclick = () => {
                if (i === q.a) {
                    document.body.classList.add('success-flash');
                    setTimeout(() => document.body.classList.remove('success-flash'), 800);
                    activeTile.classList.add('hidden');
                    solved++;
                    document.getElementById('status-bar').innerText = `ОТКЛЮЧЕНИ МОДУЛИ: ${solved} / 15`;
                    if (solved === 15) celebrate();
                    hideModal();
                } else { alert("Помисли, не бързай!"); }
            };
            list.appendChild(btn);
        });
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('question-box').style.display = 'block';
    }

    function hideModal() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('question-box').style.display = 'none';
    }

    function celebrate() {
        const status = document.getElementById('status-bar');
        status.innerText = "✨ ДОБРЕ ДОШЛИ ВЪВ ВЕРТИКАЛАТА НА ПОЗНАНИЕТО! ✨";
        status.style.color = "#00ff66";
        for (let i = 0; i < 100; i++) { createParticle(); }
    }

    function createParticle() {
        const p = document.createElement('div');
        const colors = ['#ff0033', '#00ff66', '#00ccff', '#ffcc00', '#ffffff'];
        p.style.position = 'fixed';
        p.style.width = '12px';
        p.style.height = '12px';
        p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        p.style.left = Math.random() * 100 + 'vw';
        p.style.top = '-20px';
        p.style.borderRadius = '50%';
        p.style.zIndex = '200';
        document.body.appendChild(p);

        p.animate([
            { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
            { transform: `translateY(100vh) translateX(${Math.random() * 200 - 100}px) rotate(720deg)`, opacity: 0 }
        ], { duration: Math.random() * 3000 + 2000 }).onfinish = () => p.remove();
    }

    init();
</script>
</body>
</html>
